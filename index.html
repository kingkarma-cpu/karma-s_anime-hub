<!DOCTYPE html>

<head>
  <meta name="google-adsense-account" content="ca-pub-4589241904256171">
  <title>GrandLine HUB</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

  <!-- NAVBAR -->
  <nav>
    <h1>🏴‍☠️ GrandLine Hub</h1>
    <small style="color:#aaa;">by Karma</small>

    <a href="favorites.html" style="color:white; margin-left:20px;">
      My Favorites ❤️
    </a>

    <select id="genreFilter">
      <option value="all">All Genres</option>
      <option value="action">Action</option>
      <option value="romance">Romance</option>
      <option value="comedy">Comedy</option>
      <option value="fantasy">Fantasy</option>
      <option value="sports">Sports</option>

      <option value="sliceOfLife">sliceOfLife</option>

  <!-- FEATURED -->
  <section class="featured-banner">
    <div class="banner-content">

      <h2>🔥 Featured Anime</h2>
      <h1 id="featuredTitle">Attack on Titan</h1>

      <p id="featuredDesc">
        Humans fight giant Titans while uncovering the truth behind their world.
      </p>

      <div class="banner-buttons">
        <button onclick="goToAnime('Attack on Titan')">▶ Watch</button>
        <button onclick="openTrailer({name:'Attack on Titan'})">ℹ Trailer</button>
      </div>

    </div>
  </section>

    <h2>Continue Watching ⚡</h2>
