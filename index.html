<!DOCTYPE html>
<html>
<head>
  <title>Karma's_Anime-HUB</title>
  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="images/favicon.png?v=999">
</head>

<body>

  <nav>
    <h1>🔥 Karma's_Anime-HUB</h1>

    <a href="favorites.html" style="color:white; margin-left:20px;">
      My Favorites ❤️
    </a>


    <select id="genreFilter">
  <option value="all">All Genres</option>
  <option value="action">Action</option>
  <option value="romance">Romance</option>
  <option value="comedy">Comedy</option>
  <option value="fantasy">Fantasy</option>
  <option value="sports">Sports</option>
  <option value="adventure">Adventure</option>
  <option value="ecchi">Ecchi</option>
  <option value="mystery">Mystery</option>
  <option value="isekai">Isekai</option>
  <option value="schoolLife">SchoolLife</option>
  <option value="sliceOfLife">sliceOfLife</option>
</select>
  </nav>

  <!-- SEARCH -->
  <input type="text" id="searchBar" placeholder="Search anime... 🔍">

  <!-- MOST RECENT -->
  <section class="anime-section">
    <h2>Most Recent</h2>
    <div class="anime-grid" id="recent"></div>
  </section>

  <!-- ACTION -->
  <section class="anime-section">
    <h2>Action</h2>
    <div class="anime-grid" id="action"></div>
  </section>

  <!-- ROMANCE -->
  <section class="anime-section">
    <h2>Romance</h2>
    <div class="anime-grid" id="romance"></div>
  </section>

  <!-- COMEDY -->
  <section class="anime-section">
    <h2>Comedy</h2>
    <div class="anime-grid" id="comedy"></div>
  </section>

  <!-- ADVENTURE -->
  <section class="anime-section">
    <h2>Adventure</h2>
    <div class="anime-grid" id="adventure"></div>
  </section>

   <!-- SPORTS -->
  <section class="anime-section">
    <h2>Sports</h2>
    <div class="anime-grid" id="sports"></div>
  </section>

   <!-- ECCHI -->
  <section class="anime-section">
    <h2>Ecchi</h2>
    <div class="anime-grid" id="ecchi"></div>
  </section>

  <!-- MYSTERY -->
  <section class="anime-section">
    <h2>Mystery</h2>
    <div class="anime-grid" id="mystery"></div>
  </section>

  <!-- FANTASY -->
  <section class="anime-section">
    <h2>Fantasy</h2>
    <div class="anime-grid" id="fantasy"></div>
  </section>

  <!-- ISEKAI -->
  <section class="anime-section">
    <h2>Isekai</h2>
    <div class="anime-grid" id="isekai"></div>
  </section>

  <!-- SCHOOL LIFE -->
  <section class="anime-section">
    <h2>SchoolLife</h2>
    <div class="anime-grid" id="schoolLife"></div>
  </section>

  <!-- SLICE OF LIFE -->
  <section class="anime-section">
    <h2>sliceOfLife</h2>
    <div class="anime-grid" id="sliceOfLife"></div>
  </section>
  
  <!-- JS FILE -->
  <script src="script.js"></script>

  <div id="trailerModal" class="modal">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalPlayer"></div>
  </div>
</div>

<!-- TRAILER MODAL -->
<div id="trailerModal" class="modal">
  <div class="modal-content">

    <span id="closeModal">&times;</span>

    <h2 id="modalTitle"></h2>

    <div class="video-wrapper">
      <iframe id="modalVideo"
        width="100%"
        height="400"
        frameborder="0"
        allowfullscreen
        allow="autoplay; encrypted-media">
      </iframe>
    </div>

    <p id="modalDesc"></p>

  </div>
</div>

</body>
</html>
